    <script>
      let selectionMode = false;
      let selectedItems = new Set();

      function toggleSelectionMode() {
        selectionMode = !selectionMode;
        const body = document.body;
        const btn = document.getElementById('select-btn');
        const bar = document.getElementById('selection-bar');

        if (selectionMode) {
          body.classList.add('selection-active');
          btn.innerText = 'Cancel';
          btn.classList.add('bg-white/10');
        } else {
          body.classList.remove('selection-active');
          btn.innerText = 'Select';
          btn.classList.remove('bg-white/10');
          clearSelection();
        }
        updateBar();
      }

      function handleItemClick(element) {
        if (!selectionMode) return;

        const checkIcon = element.querySelector('.check-icon');
        const circle =
          element.querySelector('.select-circle').firstElementChild;

        if (selectedItems.has(element)) {
          selectedItems.delete(element);
          checkIcon.classList.add('hidden');
          circle.classList.remove('bg-secondary');
          circle.classList.add('bg-black/40');
        } else {
          selectedItems.add(element);
          checkIcon.classList.remove('hidden');
          circle.classList.add('bg-secondary');
          circle.classList.remove('bg-black/40');
        }
        updateBar();
      }

      function updateBar() {
        const bar = document.getElementById('selection-bar');
        const countLabel = document.getElementById('selected-count');
        countLabel.innerText = selectedItems.size;

        if (selectionMode && selectedItems.size > 0) {
          bar.classList.remove('translate-y-32');
        } else {
          bar.classList.add('translate-y-32');
        }
      }

      function clearSelection() {
        selectedItems.forEach((el) => {
          const checkIcon = el.querySelector('.check-icon');
          const circle = el.querySelector('.select-circle').firstElementChild;
          checkIcon.classList.add('hidden');
          circle.classList.remove('bg-secondary');
          circle.classList.add('bg-black/40');
        });
        selectedItems.clear();
      }
    </script>
