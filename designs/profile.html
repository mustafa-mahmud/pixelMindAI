    <style>
      .glass-panel {
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top-color: rgba(255, 255, 255, 0.15);
      }
      .neon-glow-purple:hover {
        box-shadow: 0 0 20px rgba(221, 183, 255, 0.2);
      }
      .neon-glow-cyan {
        box-shadow: 0 0 15px rgba(76, 215, 246, 0.3);
      }
      .shimmer-progress {
        background: linear-gradient(
          90deg,
          #ddb7ff 0%,
          #4cd7f6 50%,
          #ddb7ff 100%
        );
        background-size: 200% 100%;
        animation: shimmer 3s infinite linear;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
        vertical-align: middle;

    <style>

          class="material-symbols-outlined"

    <script>
      // Simple micro-interaction for toggle feedback
      document.querySelectorAll('input[type="checkbox"]').forEach((toggle) => {
        toggle.addEventListener('change', function () {
          const haptic = window.navigator.vibrate;
          if (haptic) haptic(10);
        });
      });

      // Hover effect for setting buttons
      document.querySelectorAll('.group').forEach((btn) => {
        btn.addEventListener('mouseenter', () => {
          btn.style.backgroundColor = 'rgba(255, 255, 255, 0.05)';
        });
        btn.addEventListener('mouseleave', () => {
          btn.style.backgroundColor = 'transparent';
        });
      });
    </script>
