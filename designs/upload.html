<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Lumina AI - Upload Photo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Hanken+Grotesk:wght@700;800&amp;family=Geist:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #000000;
        color: #e5e2e1;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .glass-panel {
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(30px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-left: 1px solid rgba(255, 255, 255, 0.05);
      }
      .glow-purple {
        box-shadow: 0 0 20px rgba(221, 183, 255, 0.2);
      }
      .glow-cyan {
        box-shadow: 0 0 20px rgba(76, 215, 246, 0.2);
      }
      .dashed-border {
        background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='24' ry='24' stroke='%23ddb7ff80' stroke-width='2' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        border-radius: 24px;
      }
      .shimmer {
        background: linear-gradient(
          90deg,
          rgba(221, 183, 255, 0) 0%,
          rgba(221, 183, 255, 0.1) 50%,
          rgba(221, 183, 255, 0) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 3s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-tertiary-container': '#560038',
              'on-secondary-container': '#00424e',
              'surface-container-high': '#2a2a2a',
              'surface-container': '#201f1f',
              'on-surface': '#e5e2e1',
              secondary: '#4cd7f6',
              'on-error-container': '#ffdad6',
              'surface-dim': '#131313',
              'surface-container-highest': '#353534',
              'on-tertiary-fixed-variant': '#85145a',
              'on-primary-fixed': '#2c0051',
              'secondary-fixed': '#acedff',
              'surface-bright': '#3a3939',
              'on-secondary': '#003640',
              background: '#131313',
              outline: '#988d9f',
              'on-primary': '#490080',
              'on-secondary-fixed-variant': '#004e5c',
              'surface-container-low': '#1c1b1b',
              'on-secondary-fixed': '#001f26',
              error: '#ffb4ab',
              'on-primary-fixed-variant': '#6900b3',
              'surface-tint': '#ddb7ff',
              'primary-container': '#b76dff',
              'on-primary-container': '#400071',
              'tertiary-container': '#e364a7',
              'tertiary-fixed-dim': '#ffafd3',
              'inverse-primary': '#842bd2',
              'inverse-surface': '#e5e2e1',
              'on-error': '#690005',
              'secondary-fixed-dim': '#4cd7f6',
              'surface-container-lowest': '#0e0e0e',
              'on-tertiary-fixed': '#3d0026',
              surface: '#131313',
              'primary-fixed': '#f0dbff',
              'on-background': '#e5e2e1',
              tertiary: '#ffafd3',
              'secondary-container': '#03b5d3',
              'on-tertiary': '#620040',
              'outline-variant': '#4d4354',
              'primary-fixed-dim': '#ddb7ff',
              'inverse-on-surface': '#313030',
              'tertiary-fixed': '#ffd8e7',
              'surface-variant': '#353534',
              primary: '#ddb7ff',
              'on-surface-variant': '#cfc2d6',
              'error-container': '#93000a',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              'container-margin-desktop': '40px',
              'section-gap': '80px',
              'container-margin-mobile': '20px',
              'stack-unit': '8px',
              gutter: '24px',
            },
            fontFamily: {
              'headline-lg-mobile': ['Hanken Grotesk'],
              'label-sm': ['Geist'],
              'body-md': ['Inter'],
              'body-lg': ['Inter'],
              'headline-xl': ['Hanken Grotesk'],
              'headline-lg': ['Hanken Grotesk'],
              'label-md': ['Geist'],
            },
            fontSize: {
              'headline-lg-mobile': [
                '28px',
                { lineHeight: '34px', fontWeight: '700' },
              ],
              'label-sm': ['12px', { lineHeight: '16px', fontWeight: '600' }],
              'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
              'body-lg': ['18px', { lineHeight: '28px', fontWeight: '400' }],
              'headline-xl': [
                '48px',
                {
                  lineHeight: '56px',
                  letterSpacing: '-0.02em',
                  fontWeight: '800',
                },
              ],
              'headline-lg': [
                '32px',
                {
                  lineHeight: '40px',
                  letterSpacing: '-0.01em',
                  fontWeight: '700',
                },
              ],
              'label-md': [
                '14px',
                {
                  lineHeight: '20px',
                  letterSpacing: '0.02em',
                  fontWeight: '500',
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen">
    <!-- Top App Bar -->
    <header
      class="fixed top-0 w-full z-50 bg-surface-container/70 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-container-margin-mobile h-16"
    >
      <button
        class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 active:scale-95 transition-all text-on-surface"
      >
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <h1
        class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tighter text-primary"
      >
        Upload Photo
      </h1>
      <div class="w-10"></div>
      <!-- Spacer for centering -->
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-1 mt-16 px-container-margin-mobile pb-32 flex flex-col items-center justify-center max-w-lg mx-auto w-full"
    >
      <!-- Drag & Drop Area -->
      <div
        class="relative w-full aspect-square dashed-border glass-panel group cursor-pointer transition-all duration-300 hover:scale-[1.01] active:scale-[0.99] flex flex-col items-center justify-center gap-4 overflow-hidden"
        id="dropzone"
      >
        <!-- Shimmer Effect -->
        <div
          class="absolute inset-0 shimmer pointer-events-none opacity-50"
        ></div>
        <div class="relative z-10 flex flex-col items-center">
          <div
            class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
          >
            <span
              class="material-symbols-outlined text-primary text-4xl"
              data-weight="fill"
              >cloud_upload</span
            >
          </div>
          <p
            class="font-headline-lg text-headline-lg-mobile text-center text-on-surface"
          >
            Drag photo here
          </p>
          <p class="font-body-md text-on-surface-variant mt-2">
            or tap to select from files
          </p>
        </div>
        <!-- Atmospheric background visual -->
        <div
          class="absolute -bottom-10 -right-10 w-40 h-40 bg-secondary/10 blur-[60px] rounded-full"
        ></div>
        <div
          class="absolute -top-10 -left-10 w-40 h-40 bg-primary/10 blur-[60px] rounded-full"
        ></div>
      </div>
      <!-- Action Grid -->
      <div class="grid grid-cols-2 gap-4 w-full mt-8">
        <button
          class="flex flex-col items-center justify-center gap-3 p-6 rounded-[24px] bg-primary text-on-primary font-label-md glow-purple hover:brightness-110 transition-all active:scale-95"
        >
          <span class="material-symbols-outlined text-3xl">photo_library</span>
          <span class="font-headline-lg-mobile text-[16px]"
            >Browse Gallery</span
          >
        </button>
        <button
          class="flex flex-col items-center justify-center gap-3 p-6 rounded-[24px] glass-panel border border-white/10 text-on-surface font-label-md hover:bg-white/5 transition-all active:scale-95"
        >
          <span class="material-symbols-outlined text-3xl">photo_camera</span>
          <span class="font-headline-lg-mobile text-[16px]">Open Camera</span>
        </button>
      </div>
      <!-- Format Hint -->
      <div class="mt-8 text-center">
        <p
          class="font-label-sm text-on-surface-variant tracking-widest uppercase"
        >
          Supported formats
        </p>
        <p class="font-headline-lg-mobile text-lg text-secondary mt-1">
          JPG, PNG, HEIC
        </p>
      </div>
    </main>
    <!-- Fixed Footer Container -->
    <footer
      class="fixed bottom-0 left-0 w-full p-container-margin-mobile glass-panel border-t border-white/5 z-50"
    >
      <div class="max-w-lg mx-auto">
        <button
          class="w-full py-5 rounded-full bg-secondary text-on-secondary font-headline-lg-mobile text-xl font-extrabold tracking-tight glow-cyan disabled:opacity-50 disabled:grayscale transition-all active:scale-[0.98]"
        >
          Continue
        </button>
      </div>
    </footer>
    <!-- Image Context for AI Generation (Background/Decorative only) -->
    <div class="fixed inset-0 -z-10 pointer-events-none opacity-20">
      <div
        class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 blur-[120px] rounded-full"
      ></div>
      <div
        class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/20 blur-[120px] rounded-full"
      ></div>
    </div>
    <script>
      // Simple micro-interaction for drag and drop
      const dropzone = document.getElementById('dropzone');

      ['dragenter', 'dragover'].forEach((eventName) => {
        dropzone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            dropzone.classList.add('bg-primary/5', 'scale-[1.02]');
          },
          false,
        );
      });

      ['dragleave', 'drop'].forEach((eventName) => {
        dropzone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            dropzone.classList.remove('bg-primary/5', 'scale-[1.02]');
          },
          false,
        );
      });

      dropzone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          console.log('File dropped:', files[0].name);
          // logic to handle upload would go here
        }
      });

      // Click to browse file simulation
      dropzone.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/jpeg,image/png,image/heic';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            console.log('File selected:', file.name);
          }
        };
        input.click();
      });
    </script>
  </body>
</html>
