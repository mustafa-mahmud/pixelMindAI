<!doctype html>

      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
      .glass-panel {
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .neon-glow-primary:hover {
        box-shadow: 0 0 20px rgba(76, 215, 246, 0.2);
      }
      .neon-glow-purple {
        box-shadow: 0 0 15px rgba(221, 183, 255, 0.2);
      }
      .active-chip {
        background: rgba(76, 215, 246, 0.1);
        border-color: #4cd7f6;
        color: #4cd7f6;
      }
      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }
      .shimmer-effect {
        position: relative;
        overflow: hidden;
      }
      .shimmer-effect::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(221, 183, 255, 0.1),
          transparent
        );
        animation: shimmer 2s infinite;
      }
      /* Custom Slider Thumb */
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #4cd7f6;
        box-shadow: 0 0 10px rgba(76, 215, 246, 0.8);
        cursor: pointer;
      }

    <main class="mt-24 px-container-margin-mobile max-w-4xl mx-auto">
      <!-- Title & Introduction -->
      <div class="mb-10 text-center md:text-left">
        <h2 class="font-headline-lg text-headline-lg mb-2 text-white">

      <!-- Prompt Section -->

          <textarea
            class="w-full h-48 p-6 glass-panel rounded-2xl text-body-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary/50 transition-all resize-none border-white/5"

          <div class="absolute bottom-4 right-4 text-outline font-label-sm">
            0 / 1000

        </div>
        <!-- Styles Grid -->

            <button

              <div
                class="w-full aspect-square rounded-lg overflow-hidden relative"
              >
                <img

                  data-alt="A hyper-realistic cinematic portrait of a person in high-performance outdoor gear, standing atop a mountain peak during the golden hour. The lighting is crisp and natural, highlighting intricate textures of the fabric and the stunning panoramic vista in the background. The mood is professional, rugged, and breathtakingly detailed."

                />
              </div>

            </button>
            <button

              onclick="selectStyle(this)"
            >
              <div

              >
                <img

                  data-alt="Cyberpunk digital art masterpiece depicting a dense urban sprawl of towering skyscrapers under a permanent nocturnal haze. Flying vehicles leave light trails of neon cyan and electric purple. The architecture is a mix of high-tech machinery and industrial grit, with massive holographic advertisements illuminating the streets."
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuAL6N71kCa5A43lRkaeXe3kI7Lf5DWGZ8HmWUx5vwfAT331Vi80PuSkpT2drGYY3IOeNFGqJP2FvR48nA1sDR0LhwG67aHUOSlQmqYlO0hkoMMWAck44nnSjbhjA3muCua6qfKbcDXQJZSWWzo-6g67F1HomJhHspzrH2VTDasY5iKIvoF2zPqDCGBxTFNvFph-QeH7oVJllcyAJ_juuIBpsRRIL60kyzDv_zsTx4TIU07YCcGCHlL45NOr7x3Xc7rvU8R0lTtR3UU"

        <!-- Settings Row -->

          <div>
            <label

            <div class="flex gap-4">

    >
      <div class="max-w-4xl mx-auto">
        <button
          class="w-full py-5 bg-primary text-on-primary font-headline-lg-mobile text-headline-lg-mobile rounded-full font-bold shadow-[0_0_30px_rgba(221,183,255,0.3)] hover:shadow-[0_0_40px_rgba(221,183,255,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-3 group relative overflow-hidden"
        >
          <span
            class="material-symbols-outlined group-hover:rotate-12 transition-transform"
            data-icon="auto_fix_high"
            >auto_fix_high</span

          Generate Masterpiece

            class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"

    >
      <div
        class="flex items-center justify-center text-on-surface-variant w-12 h-12 hover:text-secondary transition-all cursor-pointer"
      >
        <span class="material-symbols-outlined" data-icon="home">home</span>
      </div>
      <div
        class="flex items-center justify-center bg-secondary/20 text-secondary rounded-full w-12 h-12 shadow-[0_0_15px_rgba(76,215,246,0.3)] cursor-pointer"
      >
        <span class="material-symbols-outlined" data-icon="auto_fix_high"
          >auto_fix_high</span

      </div>
      <div
        class="flex items-center justify-center text-on-surface-variant w-12 h-12 hover:text-secondary transition-all cursor-pointer"
      >
        <span class="material-symbols-outlined" data-icon="add_a_photo"
          >add_a_photo</span
        >
      </div>

        class="flex items-center justify-center text-on-surface-variant w-12 h-12 hover:text-secondary transition-all cursor-pointer"
      >
        <span class="material-symbols-outlined" data-icon="history"
          >history</span
        >
      </div>
      <div
        class="flex items-center justify-center text-on-surface-variant w-12 h-12 hover:text-secondary transition-all cursor-pointer"
      >
        <span class="material-symbols-outlined" data-icon="person">person</span>
      </div>

    <script>
      function selectStyle(element) {
        // Remove active class from siblings
        const parent = element.parentElement;
        parent.querySelectorAll('button').forEach((btn) => {
          btn.classList.remove('active-chip');
        });
        // Add active class to selected
        element.classList.add('active-chip');
      }

      function selectRatio(element) {
        const parent = element.parentElement;
        parent.querySelectorAll('button').forEach((btn) => {
          btn.classList.remove('active-chip');
        });
        element.classList.add('active-chip');
      }

      // Lightweight interactive hover for buttons
      document.querySelectorAll('button').forEach((button) => {
        button.addEventListener('mousedown', () => {
          button.style.transform = 'scale(0.95)';
        });
        button.addEventListener('mouseup', () => {
          button.style.transform = 'scale(1)';
        });
        button.addEventListener('mouseleave', () => {
          button.style.transform = 'scale(1)';
        });
      });
    </script>
